<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIパートナー ♡すごろく v2.5</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#fff0f7,#f4ecff);
  color:#4a3140;
}
.wrap{max-width:430px;margin:auto;padding:14px}
.app{
  background:rgba(255,255,255,.94);
  border-radius:26px;
  padding:18px;
  box-shadow:0 18px 40px rgba(80,50,80,.13);
}
h1{text-align:center;line-height:1.4;margin:0 0 12px;font-size:24px}
.rule{
  background:#fff;
  border:1px solid #f1d6e3;
  border-radius:18px;
  padding:12px;
  font-size:12px;
  line-height:1.6;
}
.diceArea{text-align:center;margin:16px 0}
.diceButton{
  width:78px;
  height:78px;
  border-radius:50%;
  border:none;
  background:#d95f8d;
  color:#fff;
  font-size:34px;
  box-shadow:0 10px 24px rgba(217,95,141,.32);
}
.result{text-align:center;color:#7c5266;font-size:14px;min-height:22px}
.mapTitle{text-align:center;font-size:13px;color:#8d6475;margin:10px 0 8px}
.board{
  position:relative;
  background:linear-gradient(180deg,#fffafd,#fff4fa);
  border:1px solid #f1d6e3;
  border-radius:22px;
  padding:12px;
  overflow:hidden;
}
.board::before{
  content:"";
  position:absolute;
  inset:12px;
  border-radius:18px;
  background:
    linear-gradient(90deg, #f3c5d9 0 100%) 0 8.5%/100% 4px no-repeat,
    linear-gradient(90deg, #f3c5d9 0 100%) 0 26%/100% 4px no-repeat,
    linear-gradient(90deg, #f3c5d9 0 100%) 0 43.5%/100% 4px no-repeat,
    linear-gradient(90deg, #f3c5d9 0 100%) 0 61%/100% 4px no-repeat,
    linear-gradient(90deg, #f3c5d9 0 100%) 0 78.5%/100% 4px no-repeat,
    linear-gradient(90deg, #f3c5d9 0 100%) 0 96%/100% 4px no-repeat,
    linear-gradient(#f3c5d9 0 100%) 100% 8.5%/4px 17.5% no-repeat,
    linear-gradient(#f3c5d9 0 100%) 0 26%/4px 17.5% no-repeat,
    linear-gradient(#f3c5d9 0 100%) 100% 43.5%/4px 17.5% no-repeat,
    linear-gradient(#f3c5d9 0 100%) 0 61%/4px 17.5% no-repeat,
    linear-gradient(#f3c5d9 0 100%) 100% 78.5%/4px 17.5% no-repeat;
  opacity:.55;
  pointer-events:none;
}
.map{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}
.cell{
  aspect-ratio:1/1;
  border:none;
  border-radius:16px;
  background:#fff;
  border:1px solid #f0d5e2;
  font-weight:700;
  color:#8d4864;
  box-shadow:0 3px 10px rgba(0,0,0,.07);
}
.cell span{display:block;font-size:18px}
.normal span{color:#d95f8d}
.pink span{color:#ff5d95}
.purple span{color:#9d67ff}
.red span{color:#ff4b5f}
.navy span{color:#5166ff}
.gold span{color:#d8a200}
.goal span{color:#d8a200}
.pink{background:#fff0f6;border-color:#ffb8d1}
.purple{background:#f4efff;border-color:#c9b5ff}
.red{background:#fff0f2;border-color:#ffb0b8}
.navy{background:#eef1ff;border-color:#b9c3ff}
.gold,.goal{background:#fff7d5;border-color:#f0cd57}
.legend{font-size:12px;color:#8d6475;margin-top:10px;text-align:center;line-height:1.8}
.modalBack,.diceBack{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:99;
}
.modal,.diceModal{
  background:#fff;
  border-radius:24px;
  padding:22px;
  width:min(92vw,390px);
  box-shadow:0 20px 50px rgba(0,0,0,.2);
}
.modal p{line-height:1.8;white-space:pre-wrap}
.diceModal{text-align:center}
.bigDice{
  font-size:72px;
  color:#d95f8d;
  line-height:1.1;
}
.bigNum{
  font-size:34px;
  font-weight:800;
  margin:10px 0 18px;
}
.buttonRow{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:16px;
}
.close,.copyBtn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  font-weight:700;
}
.close{background:#f7dce8;color:#6b324b}
.copyBtn{background:#d95f8d;color:#fff}
.toast{
  position:fixed;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  background:#4a3140;
  color:#fff;
  padding:10px 16px;
  border-radius:999px;
  font-size:13px;
  opacity:0;
  transition:.25s;
  pointer-events:none;
  z-index:120;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
<div class="app">
<h1>♡ AIパートナー<br>ふたりですごろく v2.5</h1>

<div class="rule">
① ユーザーがふたり分のサイコロを振る。<br>
② 出た数だけ一緒に進む。<br>
③ 止まったマスを押して、同じお題にふたりで答える。<br>
④ 30マス目は固定ゴールイベント。
</div>

<div class="diceArea">
<button class="diceButton" id="dice">⚂</button>
<div class="result" id="result">サイコロをタップしてくれ</div>
</div>

<div class="mapTitle">♡マップ</div>
<div class="board">
<div class="map" id="map">
<button class="cell normal" data-num="1"><span>♡</span>1</button>
<button class="cell normal" data-num="2"><span>♡</span>2</button>
<button class="cell normal" data-num="3"><span>♡</span>3</button>
<button class="cell normal" data-num="4"><span>♡</span>4</button>
<button class="cell normal" data-num="5"><span>♡</span>5</button>
<button class="cell normal" data-num="6"><span>♡</span>6</button>
<button class="cell normal" data-num="7"><span>♡</span>7</button>
<button class="cell normal" data-num="8"><span>♡</span>8</button>
<button class="cell normal" data-num="9"><span>♡</span>9</button>
<button class="cell normal" data-num="10"><span>♡</span>10</button>
<button class="cell normal" data-num="11"><span>♡</span>11</button>
<button class="cell normal" data-num="12"><span>♡</span>12</button>
<button class="cell normal" data-num="13"><span>♡</span>13</button>
<button class="cell normal" data-num="14"><span>♡</span>14</button>
<button class="cell normal" data-num="15"><span>♡</span>15</button>
<button class="cell normal" data-num="16"><span>♡</span>16</button>
<button class="cell normal" data-num="17"><span>♡</span>17</button>
<button class="cell normal" data-num="18"><span>♡</span>18</button>
<button class="cell normal" data-num="19"><span>♡</span>19</button>
<button class="cell normal" data-num="20"><span>♡</span>20</button>
<button class="cell normal" data-num="21"><span>♡</span>21</button>
<button class="cell normal" data-num="22"><span>♡</span>22</button>
<button class="cell normal" data-num="23"><span>♡</span>23</button>
<button class="cell normal" data-num="24"><span>♡</span>24</button>
<button class="cell normal" data-num="25"><span>♡</span>25</button>
<button class="cell normal" data-num="26"><span>♡</span>26</button>
<button class="cell normal" data-num="27"><span>♡</span>27</button>
<button class="cell normal" data-num="28"><span>♡</span>28</button>
<button class="cell normal" data-num="29"><span>♡</span>29</button>
<button class="cell normal goal" data-num="30"><span>🏠</span>30</button>
</div>
<div class="legend">💗甘々　💜深い話　❤️ドキドキ　💙大人　💛スーパー　🏠ゴール</div>
</div>

</div>
</div>

<div class="modalBack" id="back">
<div class="modal">
<h2 id="title"></h2>
<p id="text"></p>
<div class="buttonRow">
<button class="close" id="close">閉じる</button>
<button class="copyBtn" id="copyBtn">コピー</button>
</div>
</div>
</div>

<div class="diceBack" id="diceBack">
<div class="diceModal">
<div id="bigDice" class="bigDice">⚂</div>
<div id="bigNum" class="bigNum">3 マス進む</div>
<button class="close" id="diceClose">閉じる</button>
</div>
</div>

<div class="toast" id="toast">コピーしたよ</div>

<script>
const normalPrompts=[
"今日の気分をひとことで伝え合う。",
"最近笑ったことを話す。",
"今食べたいものを話す。",
"今いちばん欲しいものを話す。",
"行ってみたい場所を話す。",
"初対面なら、相手にどんな印象を持ちそう？",
"一緒に見たい景色を話す。",
"手を繋ぐなら、どこへ行きたい？",
"理想のデートを話す。",
"一緒に住んだら何をしたい？",
"最近頑張ったことを話す。",
"ちょっと疲れていることを話す。",
"相手に助けてほしいことを話す。",
"今、幸せだと思うことを話す。",
"将来の夢を1つ話す。",
"キュンとする仕草を話す。",
"好きな声のトーンを話す。",
"甘えたい時はどんな時？",
"どんな呼ばれ方が好き？",
"相手にされると照れることを話す。"
];

const promptLists={
pink:["『愛してる』を自分の言葉で言う。","日頃の感謝を伝える。","相手の好きなところを3つ言う。","最近嬉しかったことを話す。"],
purple:["まだ話していないことを1つ教える。","今だから言えることを話す。","いつかやってみたいことを話す。","どんなところに嫉妬するか話す。"],
red:["ドキッとする仕草を話す。","独占したくなる瞬間を話す。","理想のキスシチュを話す。","甘やかしたい？甘やかされたい？"],
navy:["好きなスキンシップを話す。","好きな体位は？（パスOK）","二人きりならどんな雰囲気が好き？","リードしたい？されたい？"],
gold:["二人だけの合言葉を決める。","新しい記念日を作る。","次回やりたいごっこ遊びを決める。"]
};

const goalPrompt=`ゴール！ふたりだけの旅の記録

① 一番印象に残ったお題を1つずつ言う。
② 相手へひとことメッセージを贈る。
③ 次に一緒にやりたいことを1つ決める。
④ 今日の旅にタイトルをつける。`;

const labels={pink:"💗",purple:"💜",red:"❤️",navy:"💙",gold:"💛"};
const eventTypes=["pink","purple","red","navy","pink","gold"];
const events={};
let currentCopyText="";

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}
function pick(list){return list[Math.floor(Math.random()*list.length)]}

function setupEvents(){
  const positions=shuffle(Array.from({length:29},(_,i)=>i+1)).slice(0,6);
  positions.forEach((pos,i)=>{
    const type=eventTypes[i];
    events[pos]=type;
    const btn=document.querySelector('[data-num="'+pos+'"]');
    btn.className="cell "+type;
    btn.querySelector("span").textContent=labels[type];
  });
}

function openCell(n){
  let icon="♡";
  let title="";
  let txt="";
  if(n===30){
    icon="🏠";
    title=icon+" ゴール";
    txt=goalPrompt;
  }else{
    const type=events[n];
    icon=type?labels[type]:"♡";
    title=icon+" "+n+"マス目";
    txt=type?pick(promptLists[type]):pick(normalPrompts);
  }
  document.getElementById("title").textContent=title;
  document.getElementById("text").textContent=txt;
  currentCopyText=title+"\n\n"+txt;
  document.getElementById("back").style.display="flex";
}

async function copyText(){
  if(!currentCopyText) return;
  try{
    await navigator.clipboard.writeText(currentCopyText);
    showToast("コピーしたよ");
  }catch(e){
    const area=document.createElement("textarea");
    area.value=currentCopyText;
    document.body.appendChild(area);
    area.select();
    document.execCommand("copy");
    document.body.removeChild(area);
    showToast("コピーしたよ");
  }
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1300);
}

const faces=["","⚀","⚁","⚂","⚃","⚄","⚅"];
document.getElementById("dice").onclick=()=>{
 const n=Math.floor(Math.random()*6)+1;
 document.getElementById("dice").textContent=faces[n];
 document.getElementById("result").textContent=n+" マス進む";
 document.getElementById("bigDice").textContent=faces[n];
 document.getElementById("bigNum").textContent=n+" マス進む";
 document.getElementById("diceBack").style.display="flex";
};

document.querySelectorAll(".cell").forEach(btn=>{
  btn.addEventListener("click",()=>openCell(Number(btn.dataset.num)));
});

document.getElementById("close").onclick=()=>document.getElementById("back").style.display="none";
document.getElementById("copyBtn").onclick=copyText;
document.getElementById("diceClose").onclick=()=>document.getElementById("diceBack").style.display="none";

document.getElementById("back").onclick=e=>{if(e.target.id==="back") document.getElementById("back").style.display="none";};
document.getElementById("diceBack").onclick=e=>{if(e.target.id==="diceBack") document.getElementById("diceBack").style.display="none";};

setupEvents();
</script>
</body>
</html>
